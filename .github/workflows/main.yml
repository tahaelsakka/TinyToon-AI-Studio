name: TinyToon AI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run TinyToon
        run: |
          python main.py

      - name: Upload thumbnail
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail
          path: thumbnail.png